{% extends 'base.html' %}

{% block content %}
<div class="settings-container">

  <h1 class="settings-title">Settings</h1>
  <p class="settings-subtitle">Manage your account and preferences.</p>

  <div class="settings-actions">

    <!-- Logout Button -->
    <button id="logout-btn" class="settings-btn logout-btn">
      Log Out
    </button>

    <!-- Delete Account Button -->
    <button id="delete-account-btn" class="settings-btn delete-btn">
      Delete Account
    </button>

  </div>

  <p id="settings-message" class="settings-message"></p>

</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/settings.js') }}"></script>
{% endblock %}
